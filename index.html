<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracking · Pardin Djibril</title>
<style>
:root{--bg:#060608;--card:#0f0f13;--text:#eaeaea;--muted:#7a7a8a;--pink:#e8366e;--cyan:#37b5e6;--green:#2dd4a8;--border:rgba(255,255,255,.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(232,54,110,.06),transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(55,181,230,.04),transparent 60%);pointer-events:none}
.container{background:var(--card);border-radius:20px;padding:48px 40px;max-width:440px;width:90%;border:1px solid var(--border);position:relative;z-index:1}
h1{font-size:1.3rem;font-weight:600;margin-bottom:6px;letter-spacing:-.01em}
p.sub{color:var(--muted);font-size:.82rem;margin-bottom:28px;line-height:1.5}
.field{margin-bottom:12px}
.field label{display:block;font-size:.72rem;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.field input{width:100%;padding:14px 16px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:.95rem;outline:none;transition:border .2s}
.field input:focus{border-color:var(--cyan);background:rgba(255,255,255,.05)}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--pink),var(--cyan));border:none;border-radius:12px;color:#fff;font-weight:600;font-size:.95rem;cursor:pointer;transition:opacity .2s,transform .1s}
.btn:hover{opacity:.92}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.sep{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:.7rem;text-transform:uppercase;letter-spacing:.1em}
.sep::before,.sep::after{content:'';flex:1;height:1px;background:var(--border)}
.quick{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.quick-btn{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:10px;padding:10px;color:var(--muted);font-size:.78rem;cursor:pointer;text-align:left;transition:all .15s;display:flex;align-items:center;gap:8px}
.quick-btn:hover{background:rgba(255,255,255,.05);color:var(--text);border-color:rgba(255,255,255,.12)}
.quick-btn .avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:#fff;flex-shrink:0}
.status{text-align:center;margin-top:16px;font-size:.7rem;color:var(--muted)}
.dot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:5px;vertical-align:middle}
.dot.green{background:var(--green)}
.dot.yellow{background:#e8a836}
.error{color:#e85050;font-size:.75rem;margin-top:8px;text-align:center;display:none}
.success{color:var(--green);font-size:.75rem;margin-top:8px;text-align:center;display:none}
</style>
</head>
<body>
<div class="bg"></div>
<div class="container">
 <h1>Connecte-toi avec ton email</h1>
 <p class="sub">Suivi personnalisé · Progression · Contenu exclusif</p>

 <div class="field"><label>Nom</label><input type="text" id="nom" placeholder="Ton nom" autocomplete="family-name"></div>
 <div class="field"><label>Prénom</label><input type="text" id="prenom" placeholder="Ton prénom" autocomplete="given-name"></div>
 <div class="field"><label>Email</label><input type="email" id="email" placeholder="ton.email@exemple.com" autocomplete="email"></div>
 
 <button class="btn" id="btnEnter" onclick="enter()">ENTRER</button>
 
 <div class="error" id="error"></div>
 <div class="success" id="success"></div>
 <div class="status" id="status"></div>
</div>

<script>
const SB_URL="https://nbnbsljqtolzzuqnkyae.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ibmJzbGpxdG9senp1cW5reWFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ0NDY4NjYsImV4cCI6MjA2MDAyMjg2Nn0.IrN0QzGqPBuBxNkLPJQJtlBkfGPLPSdHGL1RD4RmV4";

const saved=localStorage.getItem('djibril_student');
if(saved){const s=JSON.parse(saved);document.getElementById('nom').value=s.nom||'';document.getElementById('prenom').value=s.prenom||'';document.getElementById('email').value=s.email||'';document.getElementById('btnEnter').textContent='CONTINUER';document.getElementById('status').innerHTML='<span class="dot green"></span>Session sauvegardée'}

async function enter(){
 const n=document.getElementById('nom').value.trim(),p=document.getElementById('prenom').value.trim(),e=document.getElementById('email').value.trim();
 document.getElementById('error').style.display='none';
 document.getElementById('success').style.display='none';
 if(!n||!p||!e){document.getElementById('error').textContent='Remplis tous les champs';document.getElementById('error').style.display='block';return}
 if(!e.includes('@')){document.getElementById('error').textContent='Email invalide';document.getElementById('error').style.display='block';return}
 const btn=document.getElementById('btnEnter');btn.disabled=true;btn.textContent='Connexion...';
 document.getElementById('status').innerHTML='<span class="dot yellow"></span>Enregistrement...';
 try{
  const r=await fetch(`${SB_URL}/rest/v1/students?email=eq.${encodeURIComponent(e)}&select=*`,{headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`}});
  const ex=await r.json();
  if(ex&&ex.length>0){await fetch(`${SB_URL}/rest/v1/students?id=eq.${ex[0].id}`,{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({nom:n,prenom:p,last_active:new Date().toISOString()})})}
  else{await fetch(`${SB_URL}/rest/v1/students`,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({nom:n,prenom:p,email:e})})}
  localStorage.setItem('djibril_student',JSON.stringify({nom:n,prenom:p,email:e,ts:Date.now()}));
  document.getElementById('success').textContent='✅ Connecté ! Redirection...';document.getElementById('success').style.display='block';
  document.getElementById('status').innerHTML='<span class="dot green"></span>Connecté';
  setTimeout(()=>{window.location.href='tracking.html'},600);
 }catch(err){document.getElementById('error').textContent='Erreur: '+err.message;document.getElementById('error').style.display='block'}
 finally{btn.disabled=false;btn.textContent='ENTRER'}
}
</script>
</body>
</html>
