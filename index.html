<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracking · Pardin Djibril</title>
<style>
/* ═══ FORGE DESIGN SYSTEM ═══ */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');
:root{
  --paper:#f3ecdf;--paper-soft:#f6f1e8;--ink:#1a1614;--ink-2:#4a4038;--ink-3:#8a7e72;--ink-4:#bfb8ae;
  --ember:#e85d2c;--ember-soft:rgba(232,93,44,0.12);--blood:#b42837;--blood-soft:rgba(180,40,55,0.08);
  --gold:#d4951a;--cyan:#4aa9c4;--line:rgba(26,22,20,0.08);--line-strong:rgba(26,22,20,0.15);
  --grad-ember:linear-gradient(135deg,#e85d2c,#d4951a);
  --grad-capsule:linear-gradient(180deg,rgba(255,107,176,0.6),rgba(120,213,232,0.3),rgba(212,149,26,0.2));
  --font-body:'Inter',-apple-system,sans-serif;--font-display:'Space Grotesk',sans-serif;--font-serif:'Playfair Display',Georgia,serif;
  --r-sm:8px;--r-lg:16px;--r-pill:999px;--shadow-2:0 2px 12px rgba(26,22,20,0.06);--shadow-glow:0 4px 20px rgba(232,93,44,0.25);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--paper);color:var(--ink);min-height:100vh;position:relative;overflow-x:hidden}

/* ═══ COSMOS ANIMATIONS ═══ */
.cosmos{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.cosmos__stars{position:absolute;inset:0;font-family:var(--font-serif);font-style:italic;color:rgba(26,22,20,0.12);pointer-events:none;user-select:none;letter-spacing:0.4em;line-height:2.6;font-size:13px;white-space:pre-wrap;padding:40px;animation:stars-twinkle 8s steps(8) infinite}
.cosmos__stars--mid{color:rgba(232,93,44,0.18);font-size:16px;letter-spacing:0.6em;line-height:3.4;animation:stars-twinkle 11s steps(6) infinite reverse;transform:translate(20px,30px)}
.cosmos__stars--far{color:rgba(107,58,79,0.12);font-size:11px;letter-spacing:0.3em;line-height:2.2;animation:stars-drift 120s linear infinite;transform:translate(60px,80px)}
@keyframes stars-twinkle{0%,100%{opacity:1}25%{opacity:.4}50%{opacity:.8}75%{opacity:.3}}
@keyframes stars-drift{from{transform:translate3d(60px,80px,0)}to{transform:translate3d(-60px,-80px,0)}}
.cosmos__caps{position:absolute;inset:0;perspective:1800px;transform-style:preserve-3d;mix-blend-mode:multiply}
.cosmos__cap{position:absolute;border-radius:999px;transform-style:preserve-3d;will-change:transform;filter:saturate(1.6)brightness(1.05);border:1.5px solid rgba(26,22,20,0.6)}
.cosmos__cap::before{content:"";position:absolute;inset:8px -8px -10px 4px;border-radius:999px;background:rgba(26,22,20,0.18);z-index:-1;filter:blur(.5px)}
.cosmos__cap::after{content:"";position:absolute;inset:12% 18%;border-radius:999px;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(26,22,20,0.06) 2px,rgba(26,22,20,0.06) 3px)}
.c1{width:110px;height:220px;top:8%;left:3%;background:linear-gradient(180deg,rgba(232,93,44,0.55),rgba(212,149,26,0.25));animation:cap3d-1 18s ease-in-out infinite}
.c2{width:90px;height:180px;top:55%;left:88%;background:linear-gradient(180deg,rgba(74,169,196,0.45),rgba(107,58,79,0.3));animation:cap3d-2 22s ease-in-out infinite}
.c3{width:70px;height:140px;top:20%;left:75%;background:linear-gradient(180deg,rgba(180,40,55,0.4),rgba(232,93,44,0.2));animation:cap3d-3 20s ease-in-out infinite}
.c4{width:80px;height:160px;top:70%;left:12%;background:linear-gradient(180deg,rgba(212,149,26,0.45),rgba(74,169,196,0.25));animation:cap3d-4 24s ease-in-out infinite}
.c5{width:100px;height:200px;top:35%;left:50%;background:linear-gradient(180deg,rgba(107,58,79,0.35),rgba(232,93,44,0.3));animation:cap3d-5 16s ease-in-out infinite}
.c6{width:60px;height:120px;top:85%;left:40%;background:linear-gradient(180deg,rgba(74,169,196,0.5),rgba(180,40,55,0.2));animation:cap3d-6 26s ease-in-out infinite}
@keyframes cap3d-1{0%,100%{transform:rotateY(0deg)translate3d(0,0,0)}50%{transform:rotateY(15deg)translate3d(10px,-20px,30px)}}
@keyframes cap3d-2{0%,100%{transform:rotateY(0deg)translate3d(0,0,0)}50%{transform:rotateY(-12deg)translate3d(-15px,15px,25px)}}
@keyframes cap3d-3{0%,100%{transform:rotateY(0deg)translate3d(0,0,0)}50%{transform:rotateY(18deg)translate3d(8px,-25px,20px)}}
@keyframes cap3d-4{0%,100%{transform:rotateY(0deg)translate3d(0,0,0)}50%{transform:rotateY(-20deg)translate3d(-20px,-10px,35px)}}
@keyframes cap3d-5{0%,100%{transform:rotateY(0deg)translate3d(0,0,0)}50%{transform:rotateY(10deg)translate3d(5px,10px,15px)}}
@keyframes cap3d-6{0%,100%{transform:rotateY(0deg)translate3d(0,0,0)}50%{transform:rotateY(-15deg)translate3d(-12px,-15px,28px)}}

.shoot{position:absolute;width:2px;height:80px;background:linear-gradient(to bottom,transparent,rgba(232,93,44,0.6));border-radius:1px;animation:shoot-fly 4s linear infinite;opacity:0}
.s1{top:10%;left:20%;animation-delay:0s}
.s2{top:25%;left:65%;animation-delay:1.5s}
.s3{top:60%;left:35%;animation-delay:3s}
@keyframes shoot-fly{0%{transform:translateY(-20px)rotate(-30deg);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(100vh)rotate(-30deg);opacity:0}}

.noise{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:256px}

/* ═══ LAYOUT ═══ */
.login-wrapper{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;z-index:1}
.login-card{background:var(--paper-soft);border:1px solid var(--line-strong);border-radius:var(--r-lg);padding:48px 40px;width:100%;max-width:440px;box-shadow:var(--shadow-2);text-align:center}
.login-card h1{font-family:var(--font-display);font-size:clamp(28px,4vw,40px);color:var(--ink);margin-bottom:8px;letter-spacing:-0.5px}
.login-card h1 em{font-style:italic;background:var(--grad-ember);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-card p.sub{color:var(--ink-3);font-size:14px;margin-bottom:32px}
.field{margin-bottom:18px;text-align:left}
.field label{display:block;font-size:11px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.field input{width:100%;padding:12px 16px;border:1px solid var(--line-strong);border-radius:var(--r-sm);font-size:16px;font-family:var(--font-body);background:var(--paper);color:var(--ink);outline:none;transition:border .2s}
.field input:focus{border-color:var(--ember);box-shadow:0 0 0 3px var(--ember-soft)}
.btn-enter{width:100%;padding:14px;background:var(--grad-ember);color:#fff;border:none;border-radius:var(--r-sm);font-size:16px;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s;margin-top:8px}
.btn-enter:hover{transform:translateY(-1px);box-shadow:var(--shadow-glow)}
.btn-enter:disabled{opacity:.5;cursor:not-allowed}
.error-msg{background:var(--blood-soft);color:var(--blood);padding:12px;border-radius:var(--r-sm);font-size:13px;margin-bottom:16px;display:none}
.success-msg{background:rgba(46,160,90,0.1);color:#2e8758;padding:12px;border-radius:var(--r-sm);font-size:14px;margin-bottom:16px;display:none}
.status-msg{text-align:center;margin-top:12px;font-size:12px;color:var(--ink-3)}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px}
.dot.green{background:#2e8758}
.dot.yellow{background:#d4951a}
</style>
</head>
<body>
<div class="cosmos" aria-hidden="true">
 <div class="cosmos__stars">*  ·  *  ✧  ·  *  ✦  ·  *  ✧  ·  *  ✦  ·  *  ✧  ·  *  ✦  ·  *</div>
 <div class="cosmos__stars cosmos__stars--mid">✧  *  ·  ✦  *  ·  ✧  *  ·  ✦  *  ·  ✧  ·  *  ✦  ·  *</div>
 <div class="cosmos__stars cosmos__stars--far">·  *  ✧  ·  *  ✦  ·  *  ✧  ·  *  ✦  ·  *  ✧  ·</div>
 <div class="cosmos__caps"><div class="cosmos__cap c1"></div><div class="cosmos__cap c2"></div><div class="cosmos__cap c3"></div><div class="cosmos__cap c4"></div><div class="cosmos__cap c5"></div><div class="cosmos__cap c6"></div></div>
 <div class="shoot s1"></div><div class="shoot s2"></div><div class="shoot s3"></div>
</div>
<div class="noise"></div>

<div class="login-wrapper">
 <div class="login-card">
  <h1>Connecte-toi à ton <em>espace</em></h1>
  <p class="sub">Suivi personnalisé · Ta progression · Ton espace</p>
  <div class="error-msg" id="error"></div>
  <div class="success-msg" id="success"></div>
  <div class="field"><label>Email</label><input type="email" id="email" placeholder="ton.email@exemple.com" autocomplete="email" autofocus></div>
  <div class="field"><label>Prénom (première fois)</label><input type="text" id="prenom" placeholder="Laisse vide si déjà inscrit" autocomplete="given-name"></div>
  <div class="field"><label>Nom (première fois)</label><input type="text" id="nom" placeholder="Laisse vide si déjà inscrit" autocomplete="family-name"></div>
  <button class="btn-enter" id="btnEnter" onclick="enter()">ENTRER →</button>
  <div class="status-msg" id="status"></div>
 </div>
</div>

<script>
const API='https://nbnbsljqtolzzuqnkyae.supabase.co/functions/v1/tracking-app/api';
const E=id=>document.getElementById(id);
const savedUser=localStorage.getItem('dj_user');
const savedToken=localStorage.getItem('dj_token');
if(savedToken&&savedUser){const s=JSON.parse(savedUser);E('email').value=s.email||'';E('btnEnter').textContent='CONTINUER';E('status').innerHTML='<span class="dot green"></span>Session sauvegardée'}

async function enter(){
 const email=E('email').value.trim();const prenom=E('prenom').value.trim();const nom=E('nom').value.trim();
 E('error').style.display='none';E('success').style.display='none';
 const isLogin=!prenom&&!nom;
 if(!isLogin&&(!nom||!prenom)){E('error').textContent="Pour te connecter, mets juste ton email. Pour t'inscrire, remplis les 3 champs.";E('error').style.display='block';return}
 if(!email||!email.includes('@')){E('error').textContent='Email invalide';E('error').style.display='block';return}
 const btn=E('btnEnter');btn.disabled=true;btn.textContent='Connexion...';E('status').innerHTML='<span class="dot yellow"></span>Authentification...';
 try{
  const path=isLogin?'/auth/login':'/auth';
  const body=isLogin?{email}:{email,firstName:prenom,lastName:nom};
  const res=await fetch(API+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const data=await res.json();
  if(!res.ok)throw new Error(data.error||'Erreur');
  localStorage.setItem('dj_token',data.token);
  localStorage.setItem('dj_user',JSON.stringify(data.student));
  localStorage.setItem('djibril_student',JSON.stringify({nom,prenom,email,ts:Date.now()}));
  E('success').textContent='✅ Connecté ! Redirection...';E('success').style.display='block';
  E('status').innerHTML='<span class="dot green"></span>Connecté';
  setTimeout(()=>{window.location.href='tracking.html'},800);
 }catch(e){E('error').textContent='Erreur: '+e.message;E('error').style.display='block';E('status').innerHTML='<span class="dot" style="background:#b42837"></span>Erreur connexion'}
 finally{btn.disabled=false;btn.textContent='ENTRER'}
}
</script>
</body>
</html>
