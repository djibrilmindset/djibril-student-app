<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
<title>Ma fiche · Djibril</title>
<meta name="theme-color" content="#e85d2c">

<!-- Open Graph -->
<meta property="og:title" content="Djibril · Ma fiche">
<meta property="og:type" content="website">
<meta property="og:url" content="https://djibrilmindset.github.io/djibril-student-app/tracking.html">
<meta property="og:image" content="https://djibrilmindset.github.io/djibril-student-app/og-preview.jpg">
<meta property="og:locale" content="fr_FR">
<meta property="og:site_name" content="Djibril">
<meta name="twitter:card" content="summary_large_image">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f5efe4;
  --card:#fffaf0;
  --ink:#1a1614;
  --ink-soft:#3a322c;
  --ink-mute:#6e645a;
  --line:rgba(26,22,20,.15);
  --ember:#e85d2c;
  --ember-deep:#c73e1a;
  --ember-soft:rgba(232,93,44,.10);
  --jade:#1d8a6f;
  --crit:#c73e3a;
  --serif:'Instrument Serif',Georgia,serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{max-width:100vw;overflow-x:hidden}
body{
  font-family:var(--serif);background:var(--paper);color:var(--ink);
  min-height:100vh;-webkit-tap-highlight-color:transparent;
  font-size:17px;line-height:1.45;
}

/* SHELL */
.shell{max-width:640px;margin:0 auto;padding:0 20px 120px}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:14px;padding:18px 0;border-bottom:1px solid var(--line);margin-bottom:24px;flex-wrap:wrap}
.topbar a{text-decoration:none;color:var(--ink)}
.brand-mark{display:flex;align-items:center;gap:8px}
.brand-mark .pill{width:24px;height:12px;border-radius:999px;background:var(--ember)}
.brand-mark .label{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.topbar__user{margin-left:auto;display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 12px;border-radius:999px;background:var(--ember-soft);border:1px solid var(--line);font-family:var(--mono);font-size:11px}
.topbar__user .av{width:24px;height:24px;border-radius:50%;background:var(--ink);color:var(--paper);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;font-family:var(--mono)}

/* HEADER */
.page-head{margin-bottom:20px}
.page-head h1{font-family:var(--serif);font-weight:400;font-size:1.9rem;line-height:1.1;margin-bottom:4px}
.page-head .meta{font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--ink-mute);text-transform:uppercase}

/* STATUS PILLS */
.status-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:18px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.pill-state{padding:4px 12px;border-radius:999px;background:var(--ember-soft);color:var(--ember-deep)}
.pill-state.done{background:rgba(29,138,111,.12);color:var(--jade)}
.pill-state.locked{background:rgba(26,22,20,.85);color:var(--paper)}
.pill-pts{padding:4px 12px;border-radius:999px;background:var(--ink);color:var(--paper)}

/* CARD */
.card{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:22px 20px;margin-bottom:18px}
.card h2{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;color:var(--ink-soft);margin-bottom:14px}

/* FIELD */
.field{margin-bottom:18px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;color:var(--ink-soft);margin-bottom:8px}
.field input[type=number], .field input[type=text]{width:100%;font-family:var(--mono);font-weight:600;font-size:1.2rem;background:#fff;border:1px solid var(--line);border-radius:6px;padding:10px 12px;color:var(--ink);outline:none;text-align:left}
.field input:focus{border-color:var(--ember)}
.field textarea{width:100%;font-family:var(--serif);font-size:1rem;line-height:1.5;background:#fff;border:1px solid var(--line);border-radius:6px;padding:12px;color:var(--ink);outline:none;resize:vertical;min-height:90px}
.field textarea:focus{border-color:var(--ember)}
.field .hint{font-family:var(--mono);font-size:10px;color:var(--ink-mute);margin-top:6px;letter-spacing:.04em}
.field .hint a{color:var(--ember);text-decoration:none;border-bottom:1px dotted var(--ember)}

/* GRID 2 col */
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.field-row .field{margin-bottom:0}

/* PRESETS */
.presets{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.presets button{background:#fff;border:1px solid var(--line);font-family:var(--mono);font-size:10px;padding:5px 10px;border-radius:6px;cursor:pointer;color:var(--ink-soft);font-weight:600}
.presets button:hover{border-color:var(--ember);color:var(--ember)}
.presets button.is-on{background:var(--ink);color:var(--paper);border-color:var(--ink)}

/* SLIDER */
.slider-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.slider-head .val{font-family:var(--mono);font-weight:600;font-size:1.4rem;color:var(--ember)}
.slider-head .val .unit{font-size:.7rem;color:var(--ink-mute);margin-left:4px}
.range{-webkit-appearance:none;appearance:none;width:100%;height:6px;background:linear-gradient(to right,var(--ember) 0%,var(--ember) var(--val,0%),var(--line) var(--val,0%),var(--line) 100%);border-radius:999px;outline:none;cursor:pointer}
.range::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;background:var(--ink);border:3px solid var(--card);border-radius:50%;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.range::-moz-range-thumb{width:24px;height:24px;background:var(--ink);border:3px solid var(--card);border-radius:50%;cursor:pointer}
.tick-row{display:flex;justify-content:space-between;margin-top:8px;font-family:var(--mono);font-size:10px;color:var(--ink-mute)}
.tick-row button{background:transparent;border:none;color:var(--ink-mute);cursor:pointer;font-family:var(--mono);font-size:10px;padding:3px 6px;border-radius:4px}
.tick-row button:hover{color:var(--ember)}
.tick-row button.is-on{color:var(--ink);font-weight:700}

/* EMOJI STATE */
.emoji-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.emoji-btn{font-size:1.6rem;padding:14px 0;background:#fff;border:1px solid var(--line);border-radius:6px;cursor:pointer;line-height:1;transition:border-color .12s}
.emoji-btn:hover{border-color:var(--ember)}
.emoji-btn.is-on{background:var(--ember-soft);border-color:var(--ember)}

/* LIVE TOGGLE */
.toggle-row{display:flex;gap:8px;align-items:center}
.toggle-row .lbl{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;color:var(--ink-soft);margin-right:auto}
.toggle-row button{padding:8px 18px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--ink-soft);cursor:pointer;font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:600}
.toggle-row button.is-on{background:var(--ink);border-color:var(--ink);color:var(--paper)}

/* BUTTON */
.btn{font-family:var(--mono);font-weight:600;font-size:12px;letter-spacing:.12em;text-transform:uppercase;background:var(--ink);color:var(--paper);border:1px solid var(--ink);padding:14px 22px;border-radius:6px;cursor:pointer;transition:opacity .12s}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.45;pointer-events:none}
.btn--ember{background:var(--ember-deep);border-color:var(--ember-deep)}
.btn--full{width:100%;text-align:center}
.btn--sm{padding:8px 14px;font-size:10px}

/* MSG */
.msg{padding:12px 14px;border-radius:6px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;margin-bottom:14px}
.msg--ok{background:rgba(29,138,111,.10);border:1px solid var(--jade);color:var(--jade)}
.msg--err{background:rgba(199,62,58,.08);border:1px solid var(--crit);color:var(--crit)}

/* LOCK INFO */
.lock-info{background:rgba(212,149,26,.08);border:1px solid rgba(212,149,26,.4);border-left:3px solid #d4951a;padding:10px 12px;border-radius:6px;font-family:var(--serif);font-size:.92rem;color:var(--ink-soft);margin-bottom:14px}

/* RECAP */
.recap{margin-top:18px}
.recap h2{margin-bottom:12px}
.recap-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dotted var(--line);font-size:.95rem}
.recap-row:last-child{border-bottom:none}
.recap-label{font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--ink-mute);text-transform:uppercase}
.recap-value{font-family:var(--mono);font-weight:600;color:var(--ink)}
.recap-total{display:flex;justify-content:space-between;align-items:baseline;margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
.recap-total .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--ink-mute);text-transform:uppercase}
.recap-total .val{font-family:var(--mono);font-weight:600;font-size:1.8rem;color:var(--ember)}

/* MIC */
.mic-wrap{position:relative}
.mic-wrap textarea{padding-right:46px!important}
.mic-btn{position:absolute;top:8px;right:8px;width:32px;height:32px;border-radius:50%;border:1px solid var(--line);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--ink-soft);padding:0}
.mic-btn:hover{border-color:var(--ember);color:var(--ember)}
.mic-btn.is-recording{background:var(--crit);color:var(--paper);border-color:var(--crit)}
.mic-btn.is-busy{background:#d4951a;color:var(--paper);border-color:#d4951a;opacity:.7;pointer-events:none}
.mic-hint{font-family:var(--mono);font-size:10px;color:var(--ink-mute);margin-top:6px;min-height:1em;letter-spacing:.04em}
.mic-hint.err{color:var(--crit)}
.mic-hint.ok{color:var(--jade)}
.mic-hint.busy{color:#d4951a}

@media (max-width:500px){
  body{font-size:16px}
  .shell{padding:0 16px 100px}
  .card{padding:18px 16px}
  .field-row{grid-template-columns:1fr}
  .emoji-btn{font-size:1.4rem;padding:12px 0}
  .page-head h1{font-size:1.6rem}
}
</style>
</head>
<body>

<div class="shell" id="shell"></div>

<script>
(async function(){
  const API = 'https://nbnbsljqtolzzuqnkyae.supabase.co/functions/v1/tracking-app/api';
  const TOKEN_KEY = 'dj_token';
  const USER_KEY = 'dj_user';

  // ── Auth check ──────────────────────────────────────────
  const token = sessionStorage.getItem(TOKEN_KEY);
  const userStr = sessionStorage.getItem(USER_KEY);
  if(!token || !userStr){ window.location.href = 'index.html'; return; }
  try {
    const check = await fetch(API + '/me/today', { headers: {'Authorization':'Bearer '+token} });
    if(!check.ok){ sessionStorage.clear(); window.location.href = 'index.html'; return; }
  } catch(e){}

  const user = JSON.parse(userStr);

  // ── Helpers ─────────────────────────────────────────────
  function getTodayStr(){ return new Date().toISOString().slice(0,10); }
  async function api(method, path, body){
    const h = {'Content-Type':'application/json','Authorization':'Bearer '+token};
    const opts = {method, headers:h};
    if(body) opts.body = JSON.stringify(body);
    const res = await fetch(API + path, opts);
    if(res.status === 401){ sessionStorage.clear(); window.location.href='index.html'; return null; }
    return res.json();
  }
  function fulEmoji(f){
    if(f<=2) return '😞';
    if(f<=5) return '😐';
    if(f<=8) return '🙂';
    return '✨';
  }

  // ── State ───────────────────────────────────────────────
  let _live = false;
  let _saveCount = 0;

  // ── Render UI ───────────────────────────────────────────
  function render(){
    const shell = document.getElementById('shell');
    const today = getTodayStr();
    const todayFR = new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});

    shell.innerHTML = `
      <div class="topbar">
        <a class="brand-mark" href="index.html">
          <div class="pill"></div><div class="label">Ma fiche</div>
        </a>
        <button class="topbar__user" id="btn-logout" title="Se déconnecter">
          <div class="av">${(user.first_name||'?').slice(0,1).toUpperCase()}</div>
          <span>${user.first_name||'Élève'}</span>
        </button>
      </div>

      <header class="page-head">
        <h1>${todayFR}</h1>
        <div class="meta">${today}</div>
      </header>

      <div class="status-row">
        <span class="pill-state" id="state-pill">à remplir</span>
        <span class="pill-pts"><span id="pts-display">0</span> pts</span>
      </div>

      <div id="msg-area"></div>
      <div id="lock-area"></div>

      <!-- BLOC ACTIVITÉ -->
      <div class="card">
        <h2>Activité du jour</h2>

        <div class="field">
          <div class="slider-head">
            <label style="margin:0">Heures de taff</label>
            <span class="val"><span id="hours-display">0</span><span class="unit">h</span></span>
          </div>
          <input type="range" class="range" id="field-hours" min="0" max="16" step="0.5" value="0">
          <div class="tick-row">
            <button type="button" data-target="field-hours" data-v="0">0</button>
            <button type="button" data-target="field-hours" data-v="4">4</button>
            <button type="button" data-target="field-hours" data-v="8">8</button>
            <button type="button" data-target="field-hours" data-v="12">12</button>
            <button type="button" data-target="field-hours" data-v="16">16</button>
          </div>
        </div>

        <div class="field-row">
          <div class="field">
            <label>Calls</label>
            <input type="number" id="field-calls" min="0" value="0" inputmode="numeric">
            <div class="presets" data-target="field-calls">
              <button type="button" data-v="50">50</button>
              <button type="button" data-v="100">100</button>
              <button type="button" data-v="150">150</button>
              <button type="button" data-v="200">200</button>
            </div>
          </div>
          <div class="field">
            <label>CA (€)</label>
            <input type="number" id="field-ca" min="0" step="0.01" value="0" inputmode="decimal">
            <div class="presets" data-target="field-ca">
              <button type="button" data-v="0">0</button>
              <button type="button" data-v="297">297</button>
              <button type="button" data-v="497">497</button>
              <button type="button" data-v="997">997</button>
              <button type="button" data-v="1997">1997</button>
            </div>
          </div>
        </div>

        <div class="field-row">
          <div class="field">
            <label>Vidéos Cold vues</label>
            <input type="number" id="field-videos-cold" min="0" max="50" value="0" inputmode="numeric">
            <div class="hint">depuis <a href="https://docs.google.com/document/d/1P0x0NSB1GQDdp-ScGlaFgzwDeHKiVdhAbAK4f1RVFjI/edit" target="_blank">Doc Cold V4</a></div>
          </div>
          <div class="field">
            <label>Vidéos Closing vues</label>
            <input type="number" id="field-videos-closing" min="0" max="50" value="0" inputmode="numeric">
            <div class="hint">depuis <a href="https://docs.google.com/document/d/1BlwQNznQ9ciEcsLWrXXsD3TTDYmbgaFg8hu10H-p92k/edit" target="_blank">Doc Closing V4</a></div>
          </div>
        </div>

        <div class="field" style="margin-bottom:0">
          <div class="toggle-row">
            <span class="lbl">Live diffusion</span>
            <button id="btn-live-no" class="is-on">Non</button>
            <button id="btn-live-yes">Oui</button>
          </div>
        </div>
      </div>

      <!-- BLOC ÉTAT -->
      <div class="card">
        <h2>État du jour</h2>
        <div class="emoji-row">
          <button type="button" class="emoji-btn" data-v="2" aria-label="Mauvais">😞</button>
          <button type="button" class="emoji-btn" data-v="5" aria-label="Moyen">😐</button>
          <button type="button" class="emoji-btn" data-v="8" aria-label="Bon">🙂</button>
          <button type="button" class="emoji-btn" data-v="10" aria-label="Excellent">✨</button>
        </div>
        <input type="hidden" id="field-fulfillment" value="0">
      </div>

      <!-- BLOC NOTES -->
      <div class="card">
        <h2>Notes du jour <span style="font-family:var(--serif);font-size:.78rem;color:var(--ink-mute);text-transform:none;letter-spacing:0;font-weight:400">(optionnel)</span></h2>
        <div class="field" style="margin-bottom:0">
          <textarea id="field-note" maxlength="800" placeholder="Tape ce qui te paraît utile : un problème, une victoire, un truc à creuser. Tu peux aussi dicter au micro 🎤."></textarea>
          <div class="hint" id="note-count">0/800</div>
        </div>
      </div>

      <button class="btn btn--ember btn--full" id="btn-save">Enregistrer ma fiche</button>

      <div class="recap" id="recap-area" style="display:none">
        <div class="card">
          <h2>Récap du jour</h2>
          <div id="recap-rows"></div>
          <div class="recap-total"><span class="lbl">Total points</span><span class="val" id="recap-pts">0</span></div>
        </div>
      </div>
    `;

    bindEvents();
    loadToday();
  }

  // ── Events ──────────────────────────────────────────────
  function bindEvents(){
    document.getElementById('btn-logout').addEventListener('click', logout);
    document.getElementById('btn-save').addEventListener('click', saveEntry);
    document.getElementById('btn-live-yes').addEventListener('click',()=>toggleLive(true));
    document.getElementById('btn-live-no').addEventListener('click',()=>toggleLive(false));

    // Hours slider
    const hoursEl = document.getElementById('field-hours');
    hoursEl.addEventListener('input', updateHoursUI);

    // Hours ticks
    document.querySelectorAll('.tick-row button').forEach(b=>{
      b.addEventListener('click',()=>{
        const t = document.getElementById(b.dataset.target);
        t.value = b.dataset.v;
        t.dispatchEvent(new Event('input'));
        if(navigator.vibrate) navigator.vibrate(6);
      });
    });

    // Emoji state
    document.querySelectorAll('.emoji-btn').forEach(b=>{
      b.addEventListener('click',()=>{
        document.querySelectorAll('.emoji-btn').forEach(x=>x.classList.remove('is-on'));
        b.classList.add('is-on');
        document.getElementById('field-fulfillment').value = b.dataset.v;
        if(navigator.vibrate) navigator.vibrate(8);
        updatePtsPreview();
      });
    });

    // Number presets
    document.querySelectorAll('.presets').forEach(group=>{
      const target = document.getElementById(group.dataset.target);
      group.querySelectorAll('button').forEach(btn=>{
        btn.addEventListener('click',()=>{
          target.value = btn.dataset.v;
          target.dispatchEvent(new Event('input'));
          updatePresetActive(group, btn.dataset.v);
          if(navigator.vibrate) navigator.vibrate(6);
        });
      });
      target.addEventListener('input',()=>{ updatePresetActive(group, target.value); updatePtsPreview(); });
    });

    // Note counter
    const noteEl = document.getElementById('field-note');
    if(noteEl){
      noteEl.addEventListener('input',()=>{
        document.getElementById('note-count').textContent = `${noteEl.value.length}/800`;
      });
    }

    // Vidéos / autres inputs → preview pts
    ['field-videos-cold','field-videos-closing'].forEach(id=>{
      const el = document.getElementById(id);
      if(el) el.addEventListener('input', updatePtsPreview);
    });
  }

  function updatePresetActive(group, val){
    group.querySelectorAll('button').forEach(b=>{
      b.classList.toggle('is-on', String(b.dataset.v)===String(val));
    });
  }

  function updateHoursUI(){
    const v = parseFloat(document.getElementById('field-hours').value)||0;
    document.getElementById('field-hours').style.setProperty('--val', (v/16*100)+'%');
    document.getElementById('hours-display').textContent = v;
    document.querySelectorAll('.tick-row button[data-target="field-hours"]').forEach(b=>{
      b.classList.toggle('is-on', parseFloat(b.dataset.v)===v);
    });
    updatePtsPreview();
  }

  function toggleLive(val){
    _live = val;
    document.getElementById('btn-live-yes').classList.toggle('is-on', val);
    document.getElementById('btn-live-no').classList.toggle('is-on', !val);
    if(navigator.vibrate) navigator.vibrate(6);
    updatePtsPreview();
  }

  function logout(){
    sessionStorage.clear();
    window.location.href = 'index.html';
  }

  // ── Points (compat backend V5) ──────────────────────────
  function calcPoints(data){
    const calls = data.calls||0;
    const hrs = parseFloat(data.hours_worked||0);
    const ful = parseInt(data.fulfillment||0);
    return Math.round(hrs*2 + ful*1 + calls*2);
  }
  function previewData(){
    return {
      calls: parseInt(document.getElementById('field-calls').value)||0,
      hours_worked: parseFloat(document.getElementById('field-hours').value)||0,
      fulfillment: parseInt(document.getElementById('field-fulfillment').value)||0,
      live: _live
    };
  }
  function updatePtsPreview(){
    document.getElementById('pts-display').textContent = calcPoints(previewData());
  }

  // ── Lock state ──────────────────────────────────────────
  function applyLockState(saveCount){
    _saveCount = saveCount;
    const pill = document.getElementById('state-pill');
    const lockArea = document.getElementById('lock-area');
    const saveBtn = document.getElementById('btn-save');

    pill.classList.remove('done','locked');
    if(saveCount === 0){
      pill.textContent = 'à remplir';
      lockArea.innerHTML = '';
      saveBtn.textContent = 'Enregistrer ma fiche';
      saveBtn.disabled = false;
    } else if(saveCount === 1){
      pill.textContent = 'enregistrée';
      pill.classList.add('done');
      lockArea.innerHTML = '<div class="lock-info">Fiche enregistrée. Tu peux la modifier <b>1 dernière fois</b> aujourd\'hui.</div>';
      saveBtn.textContent = 'Modifier (dernière fois)';
      saveBtn.disabled = false;
    } else {
      pill.textContent = 'verrouillée';
      pill.classList.add('locked');
      lockArea.innerHTML = '<div class="lock-info">Fiche <b>verrouillée</b> pour aujourd\'hui. Reviens demain.</div>';
      saveBtn.textContent = 'Verrouillée';
      saveBtn.disabled = true;
      document.querySelectorAll('.card input, .card textarea, .card button, #btn-live-yes, #btn-live-no, .emoji-btn, .tick-row button, .presets button').forEach(el=>{
        el.disabled = true;
        el.style.pointerEvents = 'none';
        el.style.opacity = '0.6';
      });
    }
  }

  // ── Load today ──────────────────────────────────────────
  async function loadToday(){
    const data = await api('GET', '/me/today');
    if(!data) return;
    document.getElementById('field-calls').value = data.calls || 0;
    document.getElementById('field-ca').value = data.ca_eur || 0;
    document.getElementById('field-hours').value = data.hours_worked || 0;
    document.getElementById('field-fulfillment').value = data.fulfillment || 0;

    // Parse free_note marker V5/V7
    let note = data.free_note || '';
    let videosCold = 0, videosClosing = 0;
    const markerIdx = note.indexOf('__V5__');
    if(markerIdx >= 0){
      try {
        const v5 = JSON.parse(note.slice(markerIdx + 6));
        note = (v5.problem || '').trim();
        videosCold = v5.videos_cold || 0;
        videosClosing = v5.videos_closing || 0;
      } catch(_){
        note = note.slice(0, markerIdx).trim();
      }
    }
    document.getElementById('field-note').value = note;
    document.getElementById('field-videos-cold').value = videosCold;
    document.getElementById('field-videos-closing').value = videosClosing;
    document.getElementById('note-count').textContent = `${note.length}/800`;

    // Emoji state
    const ful = parseInt(data.fulfillment||0);
    if(ful > 0){
      document.querySelectorAll('.emoji-btn').forEach(b=>{
        b.classList.toggle('is-on', parseInt(b.dataset.v)===ful);
      });
    }

    toggleLive(data.live || false);
    updateHoursUI();

    // Presets active
    document.querySelectorAll('.presets').forEach(g=>{
      const t = document.getElementById(g.dataset.target);
      updatePresetActive(g, t.value);
    });

    applyLockState(data.save_count || 0);
    if((data.save_count || 0) > 0) updateRecap(data);
  }

  // ── Save ────────────────────────────────────────────────
  async function saveEntry(){
    const btn = document.getElementById('btn-save');
    btn.disabled = true;
    btn.textContent = 'Enregistrement...';

    const calls = parseInt(document.getElementById('field-calls').value)||0;
    const ca = parseFloat(document.getElementById('field-ca').value)||0;
    const hours_worked = parseFloat(document.getElementById('field-hours').value)||0;
    const fulfillment = parseInt(document.getElementById('field-fulfillment').value)||0;
    const note = (document.getElementById('field-note').value||'').slice(0,800).trim();
    const videos_cold = parseInt(document.getElementById('field-videos-cold').value)||0;
    const videos_closing = parseInt(document.getElementById('field-videos-closing').value)||0;

    // Marker V5 conservé pour rester compat avec le backend / outils coach
    const v5Data = {
      problem: note,
      videos_cold,
      videos_closing,
      qualif: { weekly_calls:0, weekly_ca:0, milestone:'' },
      revelation: { title:'', acknowledged:false }
    };
    const free_note = note + '\n\n__V5__' + JSON.stringify(v5Data);

    const payload = {
      calls, ca_eur: ca, live:_live,
      hours_worked, fulfillment,
      wellbeing_answers: {},
      free_note
    };

    const data = await api('PUT', '/me/entries/'+getTodayStr(), payload);
    btn.disabled = false;
    if(data && !data.error){
      const sc = data.save_count || 0;
      if(sc === 1) showMsg('ok','Fiche enregistrée. Tu peux encore la modifier 1 fois.');
      else if(sc === 2) showMsg('ok','Modification enregistrée. Fiche verrouillée pour aujourd\'hui.');
      else showMsg('ok','Fiche enregistrée.');
      applyLockState(sc);
      updateRecap(data);
      if(navigator.vibrate) navigator.vibrate([15,30,15]);
    } else {
      btn.textContent = 'Enregistrer ma fiche';
      const errMsg = (data&&data.error) || 'Erreur réseau';
      if(data && data.locked){ showMsg('err', errMsg); applyLockState(2); }
      else showMsg('err', errMsg);
    }
  }

  function updateRecap(data){
    const recapArea = document.getElementById('recap-area');
    const rowsEl = document.getElementById('recap-rows');
    const ptsEl = document.getElementById('recap-pts');
    const hrs = parseFloat(data.hours_worked||0);
    const ful = parseInt(data.fulfillment||0);
    rowsEl.innerHTML = `
      <div class="recap-row"><span class="recap-label">Heures</span><span class="recap-value">${hrs}h</span></div>
      <div class="recap-row"><span class="recap-label">État</span><span class="recap-value">${fulEmoji(ful)} ${ful}/10</span></div>
      <div class="recap-row"><span class="recap-label">Calls</span><span class="recap-value">${data.calls||0}</span></div>
      <div class="recap-row"><span class="recap-label">CA</span><span class="recap-value">${(data.ca_eur||0).toFixed(0)}€</span></div>
      <div class="recap-row"><span class="recap-label">Live</span><span class="recap-value">${data.live?'Oui':'—'}</span></div>
    `;
    ptsEl.textContent = calcPoints(data);
    recapArea.style.display = '';
  }

  function showMsg(type,text){
    const area = document.getElementById('msg-area');
    area.innerHTML = `<div class="msg msg--${type}">${text}</div>`;
    setTimeout(()=>{area.innerHTML='';}, 4000);
  }

  // ── ASR micro on note field ─────────────────────────────
  const ASR_API = 'https://nbnbsljqtolzzuqnkyae.supabase.co/functions/v1/asr-transcribe';
  let _micActive = null;

  function _setMicHint(hint, txt, cls){
    if(!hint) return;
    hint.textContent = txt || '';
    hint.className = 'mic-hint' + (cls ? ' '+cls : '');
  }

  async function _micStart(rec){
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      _setMicHint(rec.hint, 'Micro non supporté', 'err'); return;
    }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      let mime = 'audio/webm;codecs=opus';
      if(!MediaRecorder.isTypeSupported(mime)) mime = 'audio/webm';
      if(!MediaRecorder.isTypeSupported(mime)) mime = 'audio/mp4';
      const mr = new MediaRecorder(stream, mime ? {mimeType:mime} : undefined);
      const chunks = [];
      mr.ondataavailable = e => { if(e.data && e.data.size) chunks.push(e.data); };
      mr.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        rec.btn.classList.remove('is-recording');
        const blob = new Blob(chunks, { type: mime || 'audio/webm' });
        const recordedMs = Date.now() - (rec.startedAt || Date.now());
        if(blob.size < 4000 || recordedMs < 600){
          _setMicHint(rec.hint, 'Parle plus longtemps (1s min)', 'err');
          _micActive = null; return;
        }
        rec.btn.classList.add('is-busy');
        _setMicHint(rec.hint, 'Transcription...', 'busy');
        const reader = new FileReader();
        reader.onload = async () => {
          const b64 = (reader.result+'').split(',')[1];
          try {
            const r = await fetch(ASR_API + '/asr', {
              method: 'POST',
              headers: {'Content-Type':'application/json','Authorization':'Bearer '+token},
              body: JSON.stringify({ audio_base64: b64, mime: blob.type })
            });
            const data = await r.json();
            rec.btn.classList.remove('is-busy');
            if(data.error){ _setMicHint(rec.hint, 'Erreur : '+data.error, 'err'); _micActive = null; return; }
            const txt = (data.text || '').trim();
            if(!txt){ _setMicHint(rec.hint, 'Rien entendu', 'err'); _micActive = null; return; }
            if(rec.target){
              const existing = rec.target.value || '';
              const sep = existing && !existing.endsWith(' ') && !existing.endsWith('\n') ? ' ' : '';
              rec.target.value = existing + sep + txt;
              rec.target.dispatchEvent(new Event('input', {bubbles:true}));
              rec.target.focus();
            }
            _setMicHint(rec.hint, 'Transcrit ✓', 'ok');
            setTimeout(()=>_setMicHint(rec.hint, ''), 2200);
            _micActive = null;
          } catch(e){
            rec.btn.classList.remove('is-busy');
            _setMicHint(rec.hint, 'Erreur réseau', 'err');
            _micActive = null;
          }
        };
        reader.readAsDataURL(blob);
      };
      rec.mr = mr;
      rec.startedAt = Date.now();
      mr.start();
      rec.btn.classList.add('is-recording');
      _setMicHint(rec.hint, 'J\'écoute... relâche pour valider', 'ok');
      _micActive = rec;
    } catch(e){
      _setMicHint(rec.hint, 'Micro refusé', 'err');
    }
  }

  function _micStop(rec){
    if(rec && rec.mr && rec.mr.state === 'recording') rec.mr.stop();
  }

  function attachMic(elementId){
    const el = document.getElementById(elementId);
    if(!el || el.dataset.micAttached === '1') return;
    let wrap = el.parentElement;
    if(!wrap.classList.contains('mic-wrap')){
      wrap = document.createElement('div');
      wrap.className = 'mic-wrap';
      el.parentNode.insertBefore(wrap, el);
      wrap.appendChild(el);
    }
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'mic-btn';
    btn.title = 'Dicter à la voix';
    btn.innerHTML = '🎤';
    wrap.appendChild(btn);
    let hint = wrap.nextElementSibling;
    if(!hint || !hint.classList.contains('mic-hint')){
      hint = document.createElement('div');
      hint.className = 'mic-hint';
      wrap.parentNode.insertBefore(hint, wrap.nextSibling);
    }
    const rec = { btn, hint, target: el };
    const start = (e)=>{ e.preventDefault(); if(_micActive) _micStop(_micActive); _micStart(rec); };
    const stop  = (e)=>{ e.preventDefault(); if(_micActive === rec) _micStop(rec); };
    btn.addEventListener('mousedown', start);
    btn.addEventListener('mouseup', stop);
    btn.addEventListener('mouseleave', (e)=>{ if(rec.btn.classList.contains('is-recording')) stop(e); });
    btn.addEventListener('touchstart', start, {passive:false});
    btn.addEventListener('touchend', stop, {passive:false});
    btn.addEventListener('touchcancel', stop, {passive:false});
    el.dataset.micAttached = '1';
  }

  // ── Start ───────────────────────────────────────────────
  render();
  setTimeout(()=>attachMic('field-note'), 200);
})();
</script>
