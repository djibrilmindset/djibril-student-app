<style>
:root{
  --paper:#f5efe4;
  --card:#fffaf0;
  --ink:#1a1614;
  --ink-soft:#3a322c;
  --ink-mute:#6e645a;
  --line:rgba(26,22,20,.15);
  --ember:#e85d2c;
  --ember-deep:#c73e1a;
  --ember-soft:rgba(232,93,44,.10);
  --jade:#1d8a6f;
  --crit:#c73e3a;
  --serif:'Instrument Serif',Georgia,serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{max-width:100vw;overflow-x:hidden}
body{
  font-family:var(--serif);background:var(--paper);color:var(--ink);
  min-height:100vh;-webkit-tap-highlight-color:transparent;
  font-size:17px;line-height:1.45;
}

/* SHELL */
.shell{max-width:640px;margin:0 auto;padding:0 20px 120px}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:14px;padding:18px 0;border-bottom:1px solid var(--line);margin-bottom:28px;flex-wrap:wrap}
.topbar a{text-decoration:none;color:var(--ink)}
.brand-mark{display:flex;align-items:center;gap:8px}
.brand-mark .pill{width:24px;height:12px;border-radius:999px;background:var(--ember)}
.brand-mark .label{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.topbar__user{margin-left:auto;display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 12px;border-radius:999px;background:var(--ember-soft);border:1px solid var(--line);font-family:var(--mono);font-size:11px}
.topbar__user .av{width:24px;height:24px;border-radius:50%;background:var(--ink);color:var(--paper);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;font-family:var(--mono)}

/* HEADER */
.page-head{margin-bottom:18px}
.page-head h1{font-family:var(--serif);font-weight:400;font-size:2rem;line-height:1.1}

/* DAILY QUOTE */
.quote-card{background:transparent;border-left:3px solid var(--ember);padding:14px 18px;margin-bottom:22px}
.quote-card .q-text{font-family:var(--serif);font-style:italic;font-size:1.15rem;line-height:1.4;color:var(--ink-soft)}
.quote-card .q-meta{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-mute);margin-top:8px}
.quote-card .q-meta .q-author{color:var(--ink-soft);font-weight:600}

/* STATE NOTICE (post-save uniquement) */
.state-notice{display:none;font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--ink-mute);margin-bottom:16px}
.state-notice.is-on{display:block}

/* CARD */
.card{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:22px 20px;margin-bottom:18px}
.card h2{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;color:var(--ink-soft);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card h2 .req{font-size:9px;background:var(--ember-deep);color:var(--paper);padding:2px 6px;border-radius:3px;letter-spacing:.08em}

/* FIELD */
.field{margin-bottom:18px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;color:var(--ink-soft);margin-bottom:8px}
.field input[type=number], .field input[type=text]{width:100%;font-family:var(--mono);font-weight:600;font-size:1.2rem;background:#fff;border:1px solid var(--line);border-radius:6px;padding:12px 14px;color:var(--ink);outline:none;text-align:left}
.field input:focus{border-color:var(--ember)}
.field textarea{width:100%;font-family:var(--serif);font-size:1.05rem;line-height:1.5;background:#fff;border:1px solid var(--line);border-radius:6px;padding:14px;color:var(--ink);outline:none;resize:vertical;min-height:120px}
.field textarea:focus{border-color:var(--ember)}

/* TEXTAREA COUNTER */
.txt-count{font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--ink-mute);text-align:right;margin-top:6px}
.txt-count.is-short{color:var(--ember-deep)}
.txt-count.is-ok{color:var(--jade)}

/* GRID 2 col */
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.field-row .field{margin-bottom:0}

/* SLIDER */
.slider-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.slider-head .val{font-family:var(--mono);font-weight:600;font-size:1.4rem;color:var(--ember)}
.slider-head .val .unit{font-size:.7rem;color:var(--ink-mute);margin-left:4px}
.range{-webkit-appearance:none;appearance:none;width:100%;height:6px;background:linear-gradient(to right,var(--ember) 0%,var(--ember) var(--val,0%),var(--line) var(--val,0%),var(--line) 100%);border-radius:999px;outline:none;cursor:pointer}
.range::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;background:var(--ink);border:3px solid var(--card);border-radius:50%;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.range::-moz-range-thumb{width:24px;height:24px;background:var(--ink);border:3px solid var(--card);border-radius:50%;cursor:pointer}
.tick-row{display:flex;justify-content:space-between;margin-top:8px;font-family:var(--mono);font-size:11px;color:var(--ink-mute)}
.tick-row button{background:transparent;border:none;color:var(--ink-mute);cursor:pointer;font-family:var(--mono);font-size:11px;padding:4px 10px;border-radius:4px}
.tick-row button:hover{color:var(--ember)}
.tick-row button.is-on{color:var(--ink);font-weight:700}

/* EMOJI STATE */
.emoji-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.emoji-btn{font-size:1.8rem;padding:16px 0;background:#fff;border:1px solid var(--line);border-radius:6px;cursor:pointer;line-height:1;transition:border-color .12s}
.emoji-btn:hover{border-color:var(--ember)}
.emoji-btn.is-on{background:var(--ember-soft);border-color:var(--ember)}

/* PULSE Y/N */
.pulse-block{margin-top:18px;padding-top:18px;border-top:1px dotted var(--line)}
.pulse-q{font-family:var(--serif);font-size:1.05rem;line-height:1.4;color:var(--ink);margin-bottom:12px}
.pulse-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pulse-btn{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:14px 0;background:#fff;border:1px solid var(--line);border-radius:6px;cursor:pointer;color:var(--ink-soft);transition:all .12s}
.pulse-btn:hover{border-color:var(--ember);color:var(--ember)}
.pulse-btn.is-on{background:var(--ink);border-color:var(--ink);color:var(--paper)}

/* LIVE TOGGLE */
.toggle-row{display:flex;gap:8px;align-items:center}
.toggle-row .lbl{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;color:var(--ink-soft);margin-right:auto}
.toggle-row button{padding:8px 18px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--ink-soft);cursor:pointer;font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:600}
.toggle-row button.is-on{background:var(--ink);border-color:var(--ink);color:var(--paper)}

/* DETAILS REPLIABLE */
.details-card{background:transparent;border:1px dashed var(--line);border-radius:8px;margin-bottom:18px}
.details-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:transparent;border:none;cursor:pointer;font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;color:var(--ink-mute)}
.details-toggle:hover{color:var(--ember)}
.details-toggle .chev{transition:transform .2s;font-size:.9em}
.details-card.is-open .details-toggle .chev{transform:rotate(90deg)}
.details-body{display:none;padding:0 18px 18px}
.details-card.is-open .details-body{display:block}

/* BUTTON */
.btn{font-family:var(--mono);font-weight:600;font-size:12px;letter-spacing:.12em;text-transform:uppercase;background:var(--ink);color:var(--paper);border:1px solid var(--ink);padding:16px 22px;border-radius:6px;cursor:pointer;transition:opacity .12s}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.45;pointer-events:none}
.btn--ember{background:var(--ember-deep);border-color:var(--ember-deep)}
.btn--full{width:100%;text-align:center}

/* MSG */
.msg{padding:12px 14px;border-radius:6px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;margin-bottom:14px}
.msg--ok{background:rgba(29,138,111,.10);border:1px solid var(--jade);color:var(--jade)}
.msg--err{background:rgba(199,62,58,.08);border:1px solid var(--crit);color:var(--crit)}

/* RECAP */
.recap{margin-top:22px}
.recap h2{margin-bottom:12px}
.recap-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px dotted var(--line);font-size:.98rem}
.recap-row:last-child{border-bottom:none}
.recap-label{font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--ink-mute);text-transform:uppercase}
.recap-value{font-family:var(--mono);font-weight:600;color:var(--ink)}

/* MIC */
.mic-wrap{position:relative}
.mic-wrap textarea{padding-right:48px!important}
.mic-btn{position:absolute;top:10px;right:10px;width:34px;height:34px;border-radius:50%;border:1px solid var(--line);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--ink-soft);padding:0}
.mic-btn:hover{border-color:var(--ember);color:var(--ember)}
.mic-btn.is-recording{background:var(--crit);color:var(--paper);border-color:var(--crit)}
.mic-btn.is-busy{background:#d4951a;color:var(--paper);border-color:#d4951a;opacity:.7;pointer-events:none}
.mic-hint{font-family:var(--mono);font-size:10px;color:var(--ink-mute);margin-top:6px;min-height:1em;letter-spacing:.04em}
.mic-hint.err{color:var(--crit)}
.mic-hint.ok{color:var(--jade)}
.mic-hint.busy{color:#d4951a}

@media (max-width:500px){
  body{font-size:16px}
  .shell{padding:0 16px 100px}
  .card{padding:18px 16px}
  .field-row{grid-template-columns:1fr}
  .emoji-btn{font-size:1.6rem;padding:14px 0}
  .page-head h1{font-size:1.7rem}
  .quote-card .q-text{font-size:1.05rem}
}
</style>
</head>
<body>

<div class="shell" id="shell"></div>

<script>
(async function(){
  const API = 'https://nbnbsljqtolzzuqnkyae.supabase.co/functions/v1/tracking-app/api';
  const TOKEN_KEY = 'dj_token';
  const USER_KEY = 'dj_user';
  const DETAILS_OPEN_KEY = 'dj_details_open';
  const MIN_PROBLEM_CHARS = 30;

  // ───── DAILY QUOTE POOL (références bibliothèque Reset Ultra) ─────
  const QUOTE_POOL = [
    {t:"L'argent suit l'attention. Tout ce sur quoi tu focalises devient plus grand.", a:"Alex Hormozi", b:"100M$ Offers"},
    {t:"Tes prix bas ne sont pas un cadeau pour ton client, ils sont une insulte à ta valeur.", a:"Alex Hormozi", b:"100M$ Offers"},
    {t:"Le pire ennemi du closer, c'est le closer qui veut faire ami-ami avant de vendre.", a:"Jim Camp", b:"Commencez par Non"},
    {t:"Tu n'as pas besoin d'être prêt. Tu as besoin de commencer.", a:"Frank Bettger", b:"How I Raised Myself From Failure"},
    {t:"Les gens achètent sur l'émotion et justifient avec la logique. Vends à l'émotion.", a:"Zig Ziglar", b:"Secrets of Closing the Sale"},
    {t:"Ne coupe jamais la poire en deux. Trouve le 'non' caché derrière le 'oui' poli.", a:"Chris Voss", b:"Ne coupez jamais la poire"},
    {t:"Si tu n'es pas en train de vendre, quelqu'un d'autre est en train de te vendre.", a:"Grant Cardone", b:"Sell or Be Sold"},
    {t:"Tu ne montes pas au niveau de tes objectifs. Tu redescends au niveau de tes systèmes.", a:"James Clear", b:"Atomic Habits"},
    {t:"Le ciment de l'habitude se prend en 66 jours. Ce que tu fais aujourd'hui se grave.", a:"James Clear", b:"Atomic Habits"},
    {t:"Ton entourage est ton plafond. Si personne autour de toi ne fait 10k, c'est une info.", a:"Charles Duhigg", b:"Le pouvoir des habitudes"},
    {t:"Le succès est un mauvais professeur. Il te fait croire que tu es invincible.", a:"Robert Kiyosaki", b:"Père riche, père pauvre"},
    {t:"La meilleure machine de vente, c'est la répétition d'un seul angle qui marche.", a:"Chet Holmes", b:"La Machine de Vente Ultime"},
    {t:"3% du marché est prêt à acheter maintenant. Ton job, c'est de viser les 97% restants avec patience.", a:"Chet Holmes", b:"La Machine de Vente Ultime"},
    {t:"Forcer son destin, ce n'est pas attendre que la vague vienne. C'est sauter dedans avant qu'elle se forme.", a:"Anthony Bourbon", b:"Forcez votre destin"},
    {t:"Tu ne peux pas vendre ce que tu n'as pas acheté toi-même : ta propre vision.", a:"Russell Brunson", b:"DotCom Secrets"},
    {t:"Une offre irrésistible, c'est une offre que ton client serait stupide de refuser.", a:"Alex Hormozi", b:"100M$ Offers"},
    {t:"Le marketing, ce n'est pas convaincre. C'est trouver les gens qui croient déjà ce que tu crois.", a:"Seth Godin", b:"C'est ça le marketing"},
    {t:"Les gens ne se souviennent pas de ce que tu as dit. Ils se souviennent de comment tu les as fait sentir.", a:"Dale Carnegie", b:"Comment se faire des amis"},
    {t:"Tu n'as pas peur de ton objectif. Tu as peur de la personne que tu vas devenir pour l'atteindre.", a:"Lise Bourbeau", b:"Les 5 blessures"},
    {t:"Ton cerveau ne distingue pas action réelle et action imaginée. Visualise ton 10k chaque matin.", a:"Boris Aberkane", b:"Comment utiliser notre cerveau"},
    {t:"L'émotion est l'argument décisif. Ton intelligence émotionnelle est ton vrai prix de vente.", a:"Daniel Goleman", b:"L'intelligence émotionnelle"},
    {t:"Le doute coûte plus cher que l'échec. Au moins l'échec t'apprend quelque chose.", a:"Frank Bettger", b:"How I Raised Myself From Failure"},
    {t:"Ce qui se mesure s'améliore. Ce qui ne se mesure pas reste un fantasme.", a:"Ray Dalio", b:"Principles"},
    {t:"Une douleur claire vaut mille espoirs flous. Nomme ta vraie problématique.", a:"Ray Dalio", b:"Principles"},
    {t:"Si tu vises 10k et que tu agis comme à 1k, c'est ton identité qui freine, pas le marché.", a:"James Clear", b:"Atomic Habits"},
    {t:"Le prix premium n'est pas un montant. C'est une promesse tenue plus haut que celle des autres.", a:"Eugene Schwartz", b:"Breakthrough Advertising"},
    {t:"L'audience la plus chaude n'a pas besoin d'arguments. Elle a besoin d'autorisation.", a:"Eugene Schwartz", b:"Breakthrough Advertising"},
    {t:"Vendre, c'est aider quelqu'un à faire ce qu'il a déjà décidé de faire.", a:"Harry Browne", b:"Le Secret pour Vendre"},
    {t:"Ton plus grand client est celui que tu n'oses pas appeler. Appelle-le aujourd'hui.", a:"Sabri Suby", b:"Sell Like Crazy"},
    {t:"Le silence après une question fermée vaut de l'or. N'aie pas peur d'attendre.", a:"Neil Rackham", b:"SPIN Selling"}
  ];

  // ───── DAILY PULSE POOL (12 questions Reset Ultra avatar) ─────
  // positive = la réponse "saine" pour un état mental d'attaquant
  const PULSE_POOL = [
    {slug:"courage_action",  q:"T'as fait au moins 1 truc qui te faisait peur aujourd'hui ?", positive:"yes"},
    {slug:"identite_voix",   q:"T'as nommé ton objectif 5–10k à voix haute ou par écrit aujourd'hui ?", positive:"yes"},
    {slug:"parole_tenue",    q:"T'as tenu ta parole envers toi sur ce que t'avais prévu aujourd'hui ?", positive:"yes"},
    {slug:"doute_report",    q:"Le doute t'a fait reporter ou stopper une action concrète aujourd'hui ?", positive:"no"},
    {slug:"scroll_fuite",    q:"T'as scrollé plus de 30 min sans but aujourd'hui ?", positive:"no"},
    {slug:"entourage_bas",   q:"Quelqu'un de ton entourage a essayé de te tirer vers le bas aujourd'hui ?", positive:"no"},
    {slug:"vraie_conv",      q:"T'as eu au moins 1 vraie conversation business (call, vocal long, RDV) ?", positive:"yes"},
    {slug:"agir_avant_pret", q:"T'as agi avant de te sentir prêt sur un truc important aujourd'hui ?", positive:"yes"},
    {slug:"imposteur",       q:"T'as ressenti la honte ou le syndrome de l'imposteur aujourd'hui ?", positive:"no"},
    {slug:"comparaison_bas", q:"T'as comparé tes résultats à ceux des autres et ça t'a démotivé ?", positive:"no"},
    {slug:"prix_assume",     q:"T'as annoncé clairement un prix qui te fait un peu peur à un prospect ?", positive:"yes"},
    {slug:"fierte_concrete", q:"T'es fier d'au moins 1 truc concret que t'as fait aujourd'hui ?", positive:"yes"}
  ];

  // Auth check
  const token = sessionStorage.getItem(TOKEN_KEY);
  const userStr = sessionStorage.getItem(USER_KEY);
  if(!token || !userStr){ window.location.href = 'index.html'; return; }
  let user;
  try { user = JSON.parse(userStr); }
  catch(_) { sessionStorage.clear(); window.location.href = 'index.html'; return; }
  try {
    const check = await fetch(API + '/me/today', { headers: {'Authorization':'Bearer '+token} });
    if(!check.ok){ sessionStorage.clear(); window.location.href = 'index.html'; return; }
  } catch(e){}

  // Helpers
  // Date locale Paris (fix bug timezone: toISOString() est UTC → fausse date à 01h Paris)
  function getTodayStr(){
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return y+'-'+m+'-'+day;
  }
  async function api(method, path, body){
    const h = {'Content-Type':'application/json','Authorization':'Bearer '+token};
    const opts = {method, headers:h};
    if(body) opts.body = JSON.stringify(body);
    const res = await fetch(API + path, opts);
    if(res.status === 401){ sessionStorage.clear(); window.location.href='index.html'; return null; }
    return res.json();
  }
  function fulEmoji(f){
    if(f<=2) return '😞';
    if(f<=5) return '😐';
    if(f<=8) return '🙂';
    return '✨';
  }
  // Seed déterministe sur la date (FNV-1a)
  function seedFromString(s){
    let h=2166136261;
    for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)>>>0}
    return h;
  }
  function pickDaily(arr, seed){
    return arr[seed % arr.length];
  }

  // State
  let _live = false;
  let _saveCount = 0;
  let _pulseAnswer = null;   // "yes" | "no" | null
  let _pulseToday = null;    // ref vers la question du jour

  // Render
  function render(){
    const shell = document.getElementById('shell');
    const todayFR = new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
    const detailsOpen = localStorage.getItem(DETAILS_OPEN_KEY) === '1';

    // Daily picks
    const todayKey = getTodayStr();
    const seed = seedFromString(todayKey);
    const dailyQuote = pickDaily(QUOTE_POOL, seed);
    _pulseToday = pickDaily(PULSE_POOL, seed >>> 3);

    shell.innerHTML = `
      <div class="topbar">
        <a class="brand-mark" href="index.html">
          <div class="pill"></div><div class="label">Ma fiche</div>
        </a>
        <button class="topbar__user" id="btn-logout" title="Se déconnecter">
          <div class="av">${(user.first_name||'?').slice(0,1).toUpperCase()}</div>
          <span>${user.first_name||'Élève'}</span>
        </button>
      </div>

      <header class="page-head">
        <h1>${todayFR}</h1>
      </header>

      <!-- DAILY QUOTE -->
      <div class="quote-card" id="quote-card">
        <div class="q-text">« ${dailyQuote.t} »</div>
        <div class="q-meta">— <span class="q-author">${dailyQuote.a}</span> · ${dailyQuote.b}</div>
      </div>

      <div id="state-notice" class="state-notice"></div>
      <div id="msg-area"></div>

      <!-- BLOC AUJOURD'HUI -->
      <div class="card">
        <h2>Aujourd'hui</h2>

        <div class="field">
          <div class="slider-head">
            <label style="margin:0">Heures</label>
            <span class="val"><span id="hours-display">0</span><span class="unit">h</span></span>
          </div>
          <input type="range" class="range" id="field-hours" min="0" max="16" step="0.5" value="0">
          <div class="tick-row">
            <button type="button" data-target="field-hours" data-v="0">0</button>
            <button type="button" data-target="field-hours" data-v="8">8</button>
            <button type="button" data-target="field-hours" data-v="16">16</button>
          </div>
        </div>

        <div class="field-row">
          <div class="field">
            <label>Calls</label>
            <input type="number" id="field-calls" min="0" value="0" inputmode="numeric" placeholder="0">
          </div>
          <div class="field">
            <label>CA (€)</label>
            <input type="number" id="field-ca" min="0" step="0.01" value="0" inputmode="decimal" placeholder="0">
          </div>
        </div>

        <div class="field" style="margin-bottom:0">
          <label>État</label>
          <div class="emoji-row">
            <button type="button" class="emoji-btn" data-v="2" aria-label="Mauvais">😞</button>
            <button type="button" class="emoji-btn" data-v="5" aria-label="Moyen">😐</button>
            <button type="button" class="emoji-btn" data-v="8" aria-label="Bon">🙂</button>
            <button type="button" class="emoji-btn" data-v="10" aria-label="Excellent">✨</button>
          </div>
          <input type="hidden" id="field-fulfillment" value="0">
        </div>
      </div>

      <!-- BLOC PROBLEMATIQUE OBLIGATOIRE + PULSE Y/N -->
      <div class="card">
        <h2>Problématique du jour <span class="req">obligatoire</span></h2>
        <div class="field" style="margin-bottom:0">
          <textarea id="field-note" maxlength="800" placeholder="Ex : « 30 calls, 0 RDV — je récite mon ouverture, j'ai peur d'annoncer le prix. » Dicte au micro 🎤 si tu préfères."></textarea>
          <div class="txt-count is-short" id="problem-count">0 / 800 · min ${MIN_PROBLEM_CHARS} caractères</div>
        </div>

        <div class="pulse-block">
          <div class="pulse-q" id="pulse-q-text">${_pulseToday.q}</div>
          <div class="pulse-row">
            <button type="button" class="pulse-btn" data-v="yes">Oui</button>
            <button type="button" class="pulse-btn" data-v="no">Non</button>
          </div>
        </div>
      </div>

      <!-- BLOC DÉTAILS (replié par défaut) -->
      <div class="details-card${detailsOpen ? ' is-open' : ''}" id="details-card">
        <button type="button" class="details-toggle" id="details-toggle">
          <span>+ Détails (optionnel)</span>
          <span class="chev">›</span>
        </button>
        <div class="details-body">
          <div class="field-row">
            <div class="field">
              <label>Vidéos Cold</label>
              <input type="number" id="field-videos-cold" min="0" max="50" value="0" inputmode="numeric" placeholder="0">
            </div>
            <div class="field">
              <label>Vidéos Closing</label>
              <input type="number" id="field-videos-closing" min="0" max="50" value="0" inputmode="numeric" placeholder="0">
            </div>
          </div>
          <div class="field" style="margin-bottom:0">
            <div class="toggle-row">
              <span class="lbl">Live diffusion</span>
              <button id="btn-live-no" class="is-on" type="button">Non</button>
              <button id="btn-live-yes" type="button">Oui</button>
            </div>
          </div>
        </div>
      </div>

      <button class="btn btn--ember btn--full" id="btn-save">Enregistrer</button>

      <div class="recap" id="recap-area" style="display:none">
        <div class="card">
          <h2>Récap</h2>
          <div id="recap-rows"></div>
        </div>
      </div>
    `;

    bindEvents();
    loadToday();
  }

  // Events
  function bindEvents(){
    document.getElementById('btn-logout').addEventListener('click', logout);
    document.getElementById('btn-save').addEventListener('click', saveEntry);
    document.getElementById('btn-live-yes').addEventListener('click',()=>toggleLive(true));
    document.getElementById('btn-live-no').addEventListener('click',()=>toggleLive(false));

    // Details toggle
    document.getElementById('details-toggle').addEventListener('click',()=>{
      const card = document.getElementById('details-card');
      card.classList.toggle('is-open');
      localStorage.setItem(DETAILS_OPEN_KEY, card.classList.contains('is-open') ? '1' : '0');
    });

    // Hours slider
    const hoursEl = document.getElementById('field-hours');
    hoursEl.addEventListener('input', updateHoursUI);

    // Hours ticks
    document.querySelectorAll('.tick-row button').forEach(b=>{
      b.addEventListener('click',()=>{
        const t = document.getElementById(b.dataset.target);
        t.value = b.dataset.v;
        t.dispatchEvent(new Event('input'));
        if(navigator.vibrate) navigator.vibrate(6);
      });
    });

    // Emoji state
    document.querySelectorAll('.emoji-btn').forEach(b=>{
      b.addEventListener('click',()=>{
        document.querySelectorAll('.emoji-btn').forEach(x=>x.classList.remove('is-on'));
        b.classList.add('is-on');
        document.getElementById('field-fulfillment').value = b.dataset.v;
        if(navigator.vibrate) navigator.vibrate(8);
      });
    });

    // Pulse Y/N
    document.querySelectorAll('.pulse-btn').forEach(b=>{
      b.addEventListener('click',()=>{
        document.querySelectorAll('.pulse-btn').forEach(x=>x.classList.remove('is-on'));
        b.classList.add('is-on');
        _pulseAnswer = b.dataset.v;
        if(navigator.vibrate) navigator.vibrate(8);
      });
    });

    // Problème counter
    const noteEl = document.getElementById('field-note');
    noteEl.addEventListener('input', updateProblemCount);
    updateProblemCount();
  }

  function updateProblemCount(){
    const el = document.getElementById('field-note');
    const c = document.getElementById('problem-count');
    if(!el || !c) return;
    const v = (el.value||'').trim();
    const n = v.length;
    c.textContent = n + ' / 800 · min ' + MIN_PROBLEM_CHARS + ' caractères';
    c.classList.toggle('is-short', n < MIN_PROBLEM_CHARS);
    c.classList.toggle('is-ok', n >= MIN_PROBLEM_CHARS);
  }

  function updateHoursUI(){
    const v = parseFloat(document.getElementById('field-hours').value)||0;
    document.getElementById('field-hours').style.setProperty('--val', (v/16*100)+'%');
    document.getElementById('hours-display').textContent = v;
    document.querySelectorAll('.tick-row button[data-target="field-hours"]').forEach(b=>{
      b.classList.toggle('is-on', parseFloat(b.dataset.v)===v);
    });
  }

  function toggleLive(val){
    _live = val;
    document.getElementById('btn-live-yes').classList.toggle('is-on', val);
    document.getElementById('btn-live-no').classList.toggle('is-on', !val);
    if(navigator.vibrate) navigator.vibrate(6);
  }

  function logout(){
    sessionStorage.clear();
    window.location.href = 'index.html';
  }

  // Points (kept for recap only, backend compat)
  function calcPoints(data){
    const calls = data.calls||0;
    const hrs = parseFloat(data.hours_worked||0);
    const ful = parseInt(data.fulfillment||0);
    return Math.round(hrs*2 + ful*1 + calls*2);
  }

  // Lock state
  function applyLockState(saveCount){
    _saveCount = saveCount;
    const notice = document.getElementById('state-notice');
    const saveBtn = document.getElementById('btn-save');

    notice.classList.remove('is-on');
    notice.textContent = '';

    if(saveCount === 0){
      saveBtn.textContent = 'Enregistrer';
      saveBtn.disabled = false;
    } else if(saveCount === 1){
      notice.textContent = 'Enregistrée, modifiable encore 1 fois';
      notice.classList.add('is-on');
      saveBtn.textContent = 'Mettre à jour';
      saveBtn.disabled = false;
    } else {
      notice.textContent = 'Fiche du jour terminée, à demain';
      notice.classList.add('is-on');
      saveBtn.textContent = 'Terminé';
      saveBtn.disabled = true;
      document.querySelectorAll('.card input, .card textarea, .card button, #btn-live-yes, #btn-live-no, .emoji-btn, .tick-row button, .details-toggle, .pulse-btn').forEach(el=>{
        el.disabled = true;
        el.style.pointerEvents = 'none';
        el.style.opacity = '0.6';
      });
    }
  }

  // Load today
  async function loadToday(){
    const data = await api('GET', '/me/today');
    if(!data) return;
    document.getElementById('field-calls').value = data.calls || 0;
    document.getElementById('field-ca').value = data.ca_eur || 0;
    document.getElementById('field-hours').value = data.hours_worked || 0;
    document.getElementById('field-fulfillment').value = data.fulfillment || 0;

    // Parse marker V5/V7/V8
    let note = data.free_note || '';
    let videosCold = 0, videosClosing = 0;
    let pulseSlug = null, pulseAnswer = null;
    const markerIdx = note.indexOf('__V5__');
    if(markerIdx >= 0){
      try {
        const v5 = JSON.parse(note.slice(markerIdx + 6));
        note = (v5.problem || '').trim();
        videosCold = v5.videos_cold || 0;
        videosClosing = v5.videos_closing || 0;
        if(v5.pulse){
          pulseSlug = v5.pulse.slug || null;
          pulseAnswer = v5.pulse.answer || null;
        }
      } catch(_){
        note = note.slice(0, markerIdx).trim();
      }
    }
    // Fallback: wellbeing_answers stocke aussi la réponse
    if(!pulseAnswer && data.wellbeing_answers && _pulseToday){
      const w = data.wellbeing_answers[_pulseToday.slug];
      if(w === 'yes' || w === 'no') pulseAnswer = w;
    }
    document.getElementById('field-note').value = note;
    document.getElementById('field-videos-cold').value = videosCold;
    document.getElementById('field-videos-closing').value = videosClosing;
    updateProblemCount();

    // Restaure pulse réponse si même question (sinon ignore — c'est une autre journée)
    if(pulseAnswer && (!pulseSlug || pulseSlug === _pulseToday.slug)){
      _pulseAnswer = pulseAnswer;
      document.querySelectorAll('.pulse-btn').forEach(b=>{
        b.classList.toggle('is-on', b.dataset.v === pulseAnswer);
      });
    }

    // Auto-open details if filled
    if(videosCold > 0 || videosClosing > 0 || data.live){
      document.getElementById('details-card').classList.add('is-open');
    }

    // Emoji state
    const ful = parseInt(data.fulfillment||0);
    if(ful > 0){
      document.querySelectorAll('.emoji-btn').forEach(b=>{
        b.classList.toggle('is-on', parseInt(b.dataset.v)===ful);
      });
    }

    toggleLive(data.live || false);
    updateHoursUI();
    applyLockState(data.save_count || 0);
    if((data.save_count || 0) > 0) updateRecap(data);
  }

  // Save
  async function saveEntry(){
    const note = (document.getElementById('field-note').value||'').slice(0,800).trim();

    // Validations obligatoires
    if(note.length < MIN_PROBLEM_CHARS){
      showMsg('err', 'Décris ta problématique en au moins ' + MIN_PROBLEM_CHARS + ' caractères concrets');
      const el = document.getElementById('field-note');
      if(el) el.focus();
      return;
    }
    if(!_pulseAnswer){
      showMsg('err', 'Réponds Oui ou Non à la question du jour');
      const pb = document.querySelector('.pulse-btn');
      if(pb && pb.scrollIntoView) pb.scrollIntoView({behavior:'smooth', block:'center'});
      return;
    }

    const btn = document.getElementById('btn-save');
    btn.disabled = true;
    btn.textContent = 'Enregistrement...';

    const calls = parseInt(document.getElementById('field-calls').value)||0;
    const ca = parseFloat(document.getElementById('field-ca').value)||0;
    const hours_worked = parseFloat(document.getElementById('field-hours').value)||0;
    const fulfillment = parseInt(document.getElementById('field-fulfillment').value)||0;
    const videos_cold = parseInt(document.getElementById('field-videos-cold').value)||0;
    const videos_closing = parseInt(document.getElementById('field-videos-closing').value)||0;

    // Marker V5+ étendu (compat backend / outils coach)
    const v5Data = {
      problem: note,
      videos_cold,
      videos_closing,
      pulse: { slug: _pulseToday.slug, question: _pulseToday.q, answer: _pulseAnswer, positive: _pulseToday.positive },
      qualif: { weekly_calls:0, weekly_ca:0, milestone:'' },
      revelation: { title:'', acknowledged:false }
    };
    const free_note = note + '\n\n__V5__' + JSON.stringify(v5Data);

    const wellbeing_answers = {};
    wellbeing_answers[_pulseToday.slug] = _pulseAnswer;

    const payload = {
      calls, ca_eur: ca, live:_live,
      hours_worked, fulfillment,
      wellbeing_answers,
      free_note
    };

    const data = await api('PUT', '/me/entries/'+getTodayStr(), payload);
    btn.disabled = false;
    if(data && !data.error){
      const sc = data.save_count || 0;
      if(sc === 1) showMsg('ok','Enregistré, modifiable encore 1 fois');
      else if(sc === 2) showMsg('ok','Mise à jour enregistrée, fiche du jour terminée');
      else showMsg('ok','Enregistré');
      applyLockState(sc);
      updateRecap(data);
      if(navigator.vibrate) navigator.vibrate([15,30,15]);
    } else {
      btn.textContent = 'Enregistrer';
      const errMsg = (data&&data.error) || 'Erreur réseau';
      if(data && data.locked){ showMsg('err', errMsg); applyLockState(2); }
      else showMsg('err', errMsg);
    }
  }

  function updateRecap(data){
    const recapArea = document.getElementById('recap-area');
    const rowsEl = document.getElementById('recap-rows');
    const hrs = parseFloat(data.hours_worked||0);
    const ful = parseInt(data.fulfillment||0);
    const pts = calcPoints(data);
    const pulseLine = (_pulseToday && _pulseAnswer)
      ? `<div class="recap-row"><span class="recap-label">${_pulseToday.slug.replace(/_/g,' ')}</span><span class="recap-value">${_pulseAnswer === 'yes' ? 'Oui' : 'Non'}</span></div>`
      : '';
    rowsEl.innerHTML = `
      <div class="recap-row"><span class="recap-label">Heures</span><span class="recap-value">${hrs}h</span></div>
      <div class="recap-row"><span class="recap-label">Calls</span><span class="recap-value">${data.calls||0}</span></div>
      <div class="recap-row"><span class="recap-label">CA</span><span class="recap-value">${(data.ca_eur||0).toFixed(0)} €</span></div>
      <div class="recap-row"><span class="recap-label">État</span><span class="recap-value">${fulEmoji(ful)} ${ful}/10</span></div>
      ${pulseLine}
      ${data.live ? '<div class="recap-row"><span class="recap-label">Live</span><span class="recap-value">Oui</span></div>' : ''}
      <div class="recap-row"><span class="recap-label">Points</span><span class="recap-value">${pts}</span></div>
    `;
    recapArea.style.display = '';
  }

  function showMsg(type,text){
    const area = document.getElementById('msg-area');
    area.innerHTML = `<div class="msg msg--${type}">${text}</div>`;
    setTimeout(()=>{area.innerHTML='';}, 4000);
  }

  // ASR micro sur la note
  const ASR_API = 'https://nbnbsljqtolzzuqnkyae.supabase.co/functions/v1/asr-transcribe';
  let _micActive = null;

  function _setMicHint(hint, txt, cls){
    if(!hint) return;
    hint.textContent = txt || '';
    hint.className = 'mic-hint' + (cls ? ' '+cls : '');
  }

  async function _micStart(rec){
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      _setMicHint(rec.hint, 'Micro non supporté', 'err'); return;
    }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      let mime = 'audio/webm;codecs=opus';
      if(!MediaRecorder.isTypeSupported(mime)) mime = 'audio/webm';
      if(!MediaRecorder.isTypeSupported(mime)) mime = 'audio/mp4';
      const mr = new MediaRecorder(stream, mime ? {mimeType:mime} : undefined);
      const chunks = [];
      mr.ondataavailable = e => { if(e.data && e.data.size) chunks.push(e.data); };
      mr.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        rec.btn.classList.remove('is-recording');
        const blob = new Blob(chunks, { type: mime || 'audio/webm' });
        const recordedMs = Date.now() - (rec.startedAt || Date.now());
        if(blob.size < 4000 || recordedMs < 600){
          _setMicHint(rec.hint, 'Parle plus longtemps (1s min)', 'err');
          _micActive = null; return;
        }
        rec.btn.classList.add('is-busy');
        _setMicHint(rec.hint, 'Transcription...', 'busy');
        const reader = new FileReader();
        reader.onload = async () => {
          const b64 = (reader.result+'').split(',')[1];
          try {
            const r = await fetch(ASR_API + '/asr', {
              method: 'POST',
              headers: {'Content-Type':'application/json','Authorization':'Bearer '+token},
              body: JSON.stringify({ audio_base64: b64, mime: blob.type })
            });
            const data = await r.json();
            rec.btn.classList.remove('is-busy');
            if(data.error){ _setMicHint(rec.hint, 'Erreur : '+data.error, 'err'); _micActive = null; return; }
            const txt = (data.text || '').trim();
            if(!txt){ _setMicHint(rec.hint, 'Rien entendu', 'err'); _micActive = null; return; }
            if(rec.target){
              const existing = rec.target.value || '';
              const sep = existing && !existing.endsWith(' ') && !existing.endsWith('\n') ? ' ' : '';
              rec.target.value = existing + sep + txt;
              rec.target.dispatchEvent(new Event('input', {bubbles:true}));
              rec.target.focus();
            }
            _setMicHint(rec.hint, 'Transcrit ✓', 'ok');
            setTimeout(()=>_setMicHint(rec.hint, ''), 2200);
            _micActive = null;
          } catch(e){
            rec.btn.classList.remove('is-busy');
            _setMicHint(rec.hint, 'Erreur réseau', 'err');
            _micActive = null;
          }
        };
        reader.readAsDataURL(blob);
      };
      rec.mr = mr;
      rec.startedAt = Date.now();
      mr.start();
      rec.btn.classList.add('is-recording');
      _setMicHint(rec.hint, 'J\'écoute, relâche pour valider', 'ok');
      _micActive = rec;
    } catch(e){
      _setMicHint(rec.hint, 'Micro refusé', 'err');
    }
  }

  function _micStop(rec){
    if(rec && rec.mr && rec.mr.state === 'recording') rec.mr.stop();
  }

  function attachMic(elementId){
    const el = document.getElementById(elementId);
    if(!el || el.dataset.micAttached === '1') return;
    let wrap = el.parentElement;
    if(!wrap.classList.contains('mic-wrap')){
      wrap = document.createElement('div');
      wrap.className = 'mic-wrap';
      el.parentNode.insertBefore(wrap, el);
      wrap.appendChild(el);
    }
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'mic-btn';
    btn.title = 'Dicter à la voix';
    btn.innerHTML = '🎤';
    wrap.appendChild(btn);
    let hint = wrap.nextElementSibling;
    if(!hint || !hint.classList.contains('mic-hint')){
      hint = document.createElement('div');
      hint.className = 'mic-hint';
      wrap.parentNode.insertBefore(hint, wrap.nextSibling);
    }
    const rec = { btn, hint, target: el };
    const start = (e)=>{ e.preventDefault(); if(_micActive) _micStop(_micActive); _micStart(rec); };
    const stop  = (e)=>{ e.preventDefault(); if(_micActive === rec) _micStop(rec); };
    btn.addEventListener('mousedown', start);
    btn.addEventListener('mouseup', stop);
    btn.addEventListener('mouseleave', (e)=>{ if(rec.btn.classList.contains('is-recording')) stop(e); });
    btn.addEventListener('touchstart', start, {passive:false});
    btn.addEventListener('touchend', stop, {passive:false});
    btn.addEventListener('touchcancel', stop, {passive:false});
    el.dataset.micAttached = '1';
  }

  // Start
  render();
  setTimeout(()=>attachMic('field-note'), 200);
})();
</script>
