<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracking · Pardin Djibril</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');
:root{
  --paper:#f3ecdf;--paper-soft:#f6f1e8;--ink:#1a1614;--ink-2:#4a4038;--ink-3:#8a7e72;--ink-4:#bfb8ae;
  --ember:#e85d2c;--ember-soft:rgba(232,93,44,0.12);--blood:#b42837;--blood-soft:rgba(180,40,55,0.08);
  --gold:#d4951a;--cyan:#4aa9c4;--line:rgba(26,22,20,0.08);--line-strong:rgba(26,22,20,0.15);
  --grad-ember:linear-gradient(135deg,#e85d2c,#d4951a);
  --grad-capsule:linear-gradient(180deg,rgba(255,107,176,0.6),rgba(120,213,232,0.3),rgba(212,149,26,0.2));
  --font-body:'Inter',-apple-system,sans-serif;--font-display:'Space Grotesk',sans-serif;--font-serif:'Playfair Display',Georgia,serif;
  --r-sm:8px;--shadow-2:0 2px 12px rgba(26,22,20,0.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--paper);color:var(--ink);min-height:100vh;position:relative;overflow-x:hidden}

/* ═══ COSMOS (idem index) ═══ */
.cosmos{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.cosmos__stars{position:absolute;inset:0;font-family:var(--font-serif);font-style:italic;color:rgba(26,22,20,0.10);pointer-events:none;user-select:none;letter-spacing:0.4em;line-height:2.6;font-size:13px;white-space:pre-wrap;padding:40px;animation:stars-twinkle 8s steps(8) infinite}
.cosmos__stars--mid{color:rgba(232,93,44,0.15);font-size:16px;letter-spacing:0.6em;line-height:3.4;animation:stars-twinkle 11s steps(6) infinite reverse;transform:translate(20px,30px)}
@keyframes stars-twinkle{0%,100%{opacity:1}25%{opacity:.4}50%{opacity:.8}75%{opacity:.3}}
.cosmos__caps{position:absolute;inset:0;perspective:1800px;transform-style:preserve-3d;mix-blend-mode:multiply}
.cosmos__cap{position:absolute;border-radius:999px;will-change:transform;filter:saturate(1.6)brightness(1.05);border:1.5px solid rgba(26,22,20,0.6)}
.cosmos__cap::before{content:"";position:absolute;inset:8px -8px -10px 4px;border-radius:999px;background:rgba(26,22,20,0.15);z-index:-1;filter:blur(.5px)}
.c1{width:110px;height:220px;top:8%;left:3%;background:linear-gradient(180deg,rgba(232,93,44,0.55),rgba(212,149,26,0.25));animation:cap3d-1 18s ease-in-out infinite}
.c2{width:90px;height:180px;top:55%;left:88%;background:linear-gradient(180deg,rgba(74,169,196,0.45),rgba(107,58,79,0.3));animation:cap3d-2 22s ease-in-out infinite}
.c3{width:70px;height:140px;top:20%;left:75%;background:linear-gradient(180deg,rgba(180,40,55,0.4),rgba(232,93,44,0.2));animation:cap3d-3 20s ease-in-out infinite}
.c4{width:80px;height:160px;top:70%;left:12%;background:linear-gradient(180deg,rgba(212,149,26,0.45),rgba(74,169,196,0.25));animation:cap3d-4 24s ease-in-out infinite}
@keyframes cap3d-1{0%,100%{transform:rotateY(0deg)translate3d(0,0,0)}50%{transform:rotateY(15deg)translate3d(10px,-20px,30px)}}
@keyframes cap3d-2{0%,100%{transform:rotateY(0deg)translate3d(0,0,0)}50%{transform:rotateY(-12deg)translate3d(-15px,15px,25px)}}
@keyframes cap3d-3{0%,100%{transform:rotateY(0deg)translate3d(0,0,0)}50%{transform:rotateY(18deg)translate3d(8px,-25px,20px)}}
@keyframes cap3d-4{0%,100%{transform:rotateY(0deg)translate3d(0,0,0)}50%{transform:rotateY(-20deg)translate3d(-20px,-10px,35px)}}
.shoot{position:absolute;width:2px;height:80px;background:linear-gradient(to bottom,transparent,rgba(232,93,44,0.6));border-radius:1px;animation:shoot-fly 4s linear infinite;opacity:0}
.s1{top:10%;left:20%;animation-delay:0s}.s2{top:25%;left:65%;animation-delay:1.5s}.s3{top:60%;left:35%;animation-delay:3s}
@keyframes shoot-fly{0%{transform:translateY(-20px)rotate(-30deg);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(100vh)rotate(-30deg);opacity:0}}
.noise{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.02;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:256px}

/* ═══ LAYOUT ═══ */
header{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-bottom:1px solid var(--line);background:rgba(246,241,232,0.92);backdrop-filter:blur(14px);position:sticky;top:0;z-index:50}
header .user{font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--ink)}
header .status{font-size:12px;color:var(--ink-3)}
main{max-width:680px;margin:0 auto;padding:40px 24px;position:relative;z-index:1}
.card{background:var(--paper-soft);border:1px solid var(--line-strong);border-radius:12px;padding:28px;margin-bottom:20px;box-shadow:var(--shadow-2)}
.card h3{font-family:var(--font-display);font-size:16px;color:var(--ink);margin-bottom:14px;letter-spacing:-0.3px}
label{display:block;font-size:11px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
textarea{width:100%;padding:14px;background:var(--paper);border:1px solid var(--line-strong);border-radius:var(--r-sm);color:var(--ink);font-size:15px;font-family:var(--font-body);outline:none;resize:vertical;min-height:100px;transition:border .2s}
textarea:focus{border-color:var(--ember);box-shadow:0 0 0 3px var(--ember-soft)}
.saved{color:#2e8758;font-size:12px;text-align:right;margin-top:4px;opacity:0;transition:opacity .3s}
.saved.show{opacity:1}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px}
.dot.green{background:#2e8758}.dot.yellow{background:#d4951a}
.meta{font-size:11px;color:var(--ink-4);text-align:center;margin-top:40px}
.btn-logout{background:none;border:1px solid var(--line-strong);color:var(--ink-3);padding:6px 14px;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-logout:hover{background:var(--blood-soft);border-color:var(--blood);color:var(--blood)}
</style>
</head>
<body>
<div class="cosmos" aria-hidden="true">
 <div class="cosmos__stars">*  ·  *  ✧  ·  *  ✦  ·  *  ✧  ·  *  ✦  ·  *  ✧  ·  *</div>
 <div class="cosmos__stars cosmos__stars--mid">✧  *  ·  ✦  *  ·  ✧  *  ·  ✦  *  ·  ✧  ·  *  ✦</div>
 <div class="cosmos__caps"><div class="cosmos__cap c1"></div><div class="cosmos__cap c2"></div><div class="cosmos__cap c3"></div><div class="cosmos__cap c4"></div></div>
 <div class="shoot s1"></div><div class="shoot s2"></div><div class="shoot s3"></div>
</div>
<div class="noise"></div>

<header>
 <span class="user" id="userName">...</span>
 <button class="btn-logout" onclick="logout()">Déconnexion</button>
 <span class="status" id="saveStatus"><span class="dot yellow"></span>En attente</span>
</header>

<main>
 <div class="card"><h3>📝 Notes personnelles</h3><textarea id="notes" placeholder="Tes pensées, réflexions, prises de conscience..."></textarea><div class="saved" id="notesSaved">✓ Sauvegardé</div></div>
 <div class="card"><h3>🎯 Objectifs</h3><textarea id="goals" placeholder="Ce que tu veux accomplir..."></textarea><div class="saved" id="goalsSaved">✓ Sauvegardé</div></div>
 <div class="card"><h3>💡 Insights</h3><textarea id="insights" placeholder="Ce que tu as compris aujourd'hui..."></textarea><div class="saved" id="insightsSaved">✓ Sauvegardé</div></div>
 <div class="meta">Auto-sauvegarde · Données chiffrées · Pardin Djibril</div>
</main>

<script>
const API='https://nbnbsljqtolzzuqnkyae.supabase.co/functions/v1/tracking-app/api';
const TOKEN=localStorage.getItem('dj_token');const USER=JSON.parse(localStorage.getItem('dj_user')||'null');
if(!TOKEN||!USER){window.location.href='./'}
const FIELDS=['notes','goals','insights'];const SAVE_DEBOUNCE=2000;let saveTimers={};
document.getElementById('userName').textContent=USER.first_name+' '+(USER.full_name||'');
FIELDS.forEach(f=>{const val=localStorage.getItem('djibril_'+f);if(val)document.getElementById(f).value=val});
(async()=>{try{const res=await fetch(API+'/me/today',{headers:{'Authorization':'Bearer '+TOKEN}});if(!res.ok){if(res.status===401)window.location.href='./';return}const data=await res.json();if(data)FIELDS.forEach(f=>{if(data[f]){document.getElementById(f).value=data[f];localStorage.setItem('djibril_'+f,data[f])}})}catch(e){console.log('Restore:',e)}})();
FIELDS.forEach(f=>{document.getElementById(f).addEventListener('input',()=>{const val=document.getElementById(f).value;localStorage.setItem('djibril_'+f,val);clearTimeout(saveTimers[f]);const savedEl=document.getElementById(f+'Saved');savedEl.classList.remove('show');document.getElementById('saveStatus').innerHTML='<span class="dot yellow"></span>Sauvegarde...';saveTimers[f]=setTimeout(()=>saveToEdge(f,val,savedEl),SAVE_DEBOUNCE)})});
async function saveToEdge(field,value,savedEl){try{const allData={};FIELDS.forEach(f=>allData[f]=document.getElementById(f).value);const today=new Date().toISOString().slice(0,10);const res=await fetch(API+'/me/entries/'+today,{method:'PUT',headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify({...allData,dm:0,calls:0,videos:0,live:false,ca_eur:0})});if(res.status===401){window.location.href='./';return}savedEl.classList.add('show');document.getElementById('saveStatus').innerHTML='<span class="dot green"></span>Sauvegardé';setTimeout(()=>savedEl.classList.remove('show'),2000)}catch(e){document.getElementById('saveStatus').innerHTML='<span class="dot" style="background:#b42837"></span>Erreur';console.error('Save:',e)}}
function logout(){localStorage.clear();window.location.href='./'}
</script>
</body>
</html>
